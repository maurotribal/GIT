<!DOCTYPE html>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organograma — Portal Informática Básica 2026</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Merriweather:wght@700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #F4F7FB; /* Fundo mais claro e suave inspirado na imagem */
  font-family: 'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}

.slide {
  width: 100vw; height: 100vh;
  display: grid;
  grid-template-rows: 4px 54px 22px 1fr 46px;
  user-select: none;
}

/* ── Progress bar ── */
.prog-track { background: #E2E8F0; }
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, #3A76DF 0%, #8B5CF6 55%, #10B981 100%);
  transition: width .55s cubic-bezier(.4,0,.2,1);
}

/* ── Top bar ── */
.topbar {
  background: #ffffff;
  border-bottom: 1px solid #E2E8F0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px;
}
.topbar-brand h1 {
  font-size: 11.5px; font-weight: 700; color: #1E293B;
  text-transform: uppercase; letter-spacing: .08em;
}
.topbar-brand p { font-size: 10.5px; color: #64748B; margin-top: 2px; }
.step-dots { display: flex; gap: 7px; align-items: center; }
.dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #E2E8F0;
  transition: background .3s ease, transform .3s ease, width .3s ease;
}
.dot.past   { background: #93C5FD; }
.dot.active { background: #3A76DF; transform: scale(1.45); }

/* ── Step label ── */
.step-lbl {
  display: flex; align-items: center; justify-content: center;
  font-size: 10.5px; font-weight: 600; color: #64748B;
  letter-spacing: .08em; text-transform: uppercase;
  background: #F4F7FB;
  transition: opacity .3s;
}

/* ── SVG area ── */
.svg-wrap {
  display: flex; align-items: center; justify-content: center;
  padding: 6px 24px 2px;
  cursor: pointer;
  overflow: hidden;
}
.svg-wrap svg { width: 100%; height: 100%; display: block; }

/* ── Bottom bar ── */
.bottombar {
  background: #ffffff; border-top: 1px solid #E2E8F0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px;
}
.hint { font-size: 10.5px; color: #9CA3AF; }
.navbtns { display: flex; align-items: center; gap: 8px; }
.ctr { font-size: 10.5px; color: #64748B; min-width: 72px; text-align: right; }
.btn {
  height: 28px; padding: 0 14px;
  border: 1px solid #E2E8F0; border-radius: 6px;
  background: #fff; color: #1E293B;
  font: 600 11px/1 'IBM Plex Sans','Segoe UI',sans-serif;
  cursor: pointer;
  transition: background .15s, border-color .15s, color .15s;
  letter-spacing: .02em;
}
.btn:hover:not(:disabled) { background: #F8FAFC; border-color: #CBD5E1; }
.btn:disabled { opacity: .3; cursor: not-allowed; }
.btn-p {
  background: #3A76DF; color: #fff; border-color: #3A76DF;
}
.btn-p:hover:not(:disabled) { background: #2563EB; border-color: #2563EB; }
.btn-done {
  background: #10B981; color: #fff; border-color: #10B981;
}

/* ── SVG animated step elements ── */
.s {
  opacity: 0;
  transform: translateY(10px);
  transition: opacity .48s ease, transform .48s ease;
}
.s.v { opacity: 1; transform: translateY(0); }

/* stagger delays */
.d0 { transition-delay: 0ms;   }
.d1 { transition-delay: 130ms; }
.d2 { transition-delay: 260ms; }
.d3 { transition-delay: 390ms; }
.d4 { transition-delay: 510ms; }

</style>

    <rect x="686" y="443" width="6"   height="40" rx="3" fill="#F59E0B"/>
    <text x="700" y="453" dominant-baseline="central"
      fill="#F59E0B" font-size="8" font-weight="700" letter-spacing=".09em"
      font-family="'IBM Plex Sans',sans-serif">CONTROLES</text>
    <text x="700" y="463" dominant-baseline="central"
      fill="#475569" font-size="9"
      font-family="'IBM Plex Sans',sans-serif">← Anterior · Próximo →</text>
    <text x="700" y="474" dominant-baseline="central"
      fill="#475569" font-size="9"
      font-family="'IBM Plex Sans',sans-serif">Tela Cheia · ESC</text>
  </g>

  </svg>
  </div>

  <div class="bottombar">
    <span class="hint">
      Clique na tela &nbsp;·&nbsp; ← → para navegar &nbsp;·&nbsp; ESC para sair da tela cheia
    </span>
    <div class="navbtns">
      <span class="ctr" id="ctr">Passo 1 de 6</span>
      <button class="btn" id="bPrev" onclick="go(-1)" disabled>← Voltar</button>
      <button class="btn btn-p" id="bNext" onclick="go(1)">Avançar →</button>
    </div>
  </div>

</div>

<script>
const TOTAL = 6;
const LABELS = [
  'Visão Geral do Portal',
  'Três Cursos Disponíveis',
  'Curso 01 — Windows 10  ·  4 Módulos',
  'Curso 02 — Microsoft Office  ·  4 Módulos',
  'Curso 03 — Internet e Novas Tecnologias  ·  4 Módulos',
  'Estrutura Completa das Apresentações'
];

let cur = 1;

function render() {
  // Progress bar
  document.getElementById('prog').style.width = (cur / TOTAL * 100) + '%';

  // Step label
  document.getElementById('lbl').textContent = LABELS[cur - 1];

  // Counter
  document.getElementById('ctr').textContent = 'Passo ' + cur + ' de ' + TOTAL;

  // Dots
  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = Array.from({length: TOTAL}, (_, i) => {
    let cls = 'dot';
    if (i + 1 < cur)  cls += ' past';
    if (i + 1 === cur) cls += ' active';
    return '<div class="' + cls + '"></div>';
  }).join('');

  // SVG steps
  document.querySelectorAll('[data-step]').forEach(el => {
    const s = parseInt(el.dataset.step);
    if (s <= cur) el.classList.add('v');
    else          el.classList.remove('v');
  });

  // Buttons
  const bPrev = document.getElementById('bPrev');
  const bNext = document.getElementById('bNext');
  bPrev.disabled = cur <= 1;
  bNext.disabled = cur >= TOTAL;
  bNext.className = cur >= TOTAL ? 'btn btn-done' : 'btn btn-p';
  bNext.textContent = cur >= TOTAL ? '✓ Concluído' : 'Avançar →';
}

function go(dir) {
  const next = cur + dir;
  if (next < 1 || next > TOTAL) return;

  // Going backward → instant disappear (no stagger delays)
  if (dir < 0) {
    document.querySelectorAll('.s').forEach(el => {
      el.style.transitionDelay = '0ms';
    });
  } else {
    // Going forward → restore class-based delays
    document.querySelectorAll('.s').forEach(el => {
      el.style.transitionDelay = '';
    });
  }

  cur = next;
  render();
}

// Click SVG area to advance
document.getElementById('wrap').addEventListener('click', () => {
  if (cur < TOTAL) go(1);
});

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(1); }
  if (e.key === 'ArrowLeft')                   { e.preventDefault(); go(-1); }
  if (e.key === 'F11')                         { e.preventDefault(); toggleFS(); }
});

// Optional fullscreen toggle
function toggleFS() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
}

// Init
render();
</script>
</body>
</html>
